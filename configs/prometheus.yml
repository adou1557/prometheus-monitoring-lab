# 2. `configs/prometheus.yml`

Ce fichier représente la configuration propre que tu dois expliquer dans ton repo. Tes notes indiquent que tu as ajouté Node Exporter dans `/etc/prometheus/prometheus.yml` avec la target `localhost:9100`. 【1-074903】

```yaml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "localhost:9100"
